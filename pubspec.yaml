name: survey_rewards
description: "Survey Rewards - Share your opinion, earn rewards"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  shared_preferences: ^2.3.0
  uuid: ^4.5.1
  intl: ^0.20.2
  flutter_riverpod: ^2.6.1
  confetti: ^0.8.0
  google_mobile_ads: ^5.3.0
  # GMA 5.x transitively requires webview_flutter_wkwebview on iOS;
  # declaring the umbrella plugin makes Flutter generate the missing
  # podspec so CocoaPods can resolve it.
  webview_flutter: ^4.10.0
  # ATT prompt (iOS 14.5+). GMA 5.x does not auto-trigger; without an
  # explicit request iOS serves SKAdNetwork-only ads with reduced eCPM.
  app_tracking_transparency: ^2.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#6C63FF"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter:
  uses-material-design: true
